<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Home - YANS</title>
  <link rel="icon" type="image/svg+xml" href="images/YANS_LOGO_SOLO.svg">

  <link rel="stylesheet" href="global.css">
  <script src="global.js" defer></script>

  <script>
    if (!document.cookie.includes("yansHuman=1")) {
      window.location.href = "index.html";
    }
  </script>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script src="firebase.js"></script>

  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <style>
    body {
      padding: 5px;
      background: #0d0d0d;
      color: white;
      font-family: 'Yu Gothic UI', sans-serif;
    }

    /* ------------------ GLASSY PANELS ------------------ */
    .glass {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      box-shadow: 0 0 25px rgba(0,0,0,0.4);
    }

    /* ------------------ MUSIC POPUP ------------------ */
    #musicPopup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 320px;
      padding: 25px;
      text-align: center;
      z-index: 9999;
      color: white;
    }

    .popup-btn {
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      margin: 5px;
      border: none;
      font-weight: bold;
      transition: 0.2s;
    }

    #yesBtn { background: #28a745; color: white; }
    #noBtn { background: #cc0000; color: white; }

    .popup-btn:hover {
      opacity: 0.85;
      transform: scale(1.03);
    }

    /* ------------------ MUSIC CONTROLS ------------------ */
    #musicControls {
      position: fixed;
      bottom: 15px;
      right: 15px;
      padding: 10px;
      display: none;
      gap: 10px;
      z-index: 9999;
    }

    .ctrl-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      padding: 8px;
      cursor: pointer;
      font-size: 20px;
      border-radius: 6px;
      transition: 0.2s;
    }

    .ctrl-btn:hover {
      background: rgba(255,255,255,0.2);
      transform: scale(1.05);
    }

    /* ------------------ TOP BAR ------------------ */
    #logoutBtn {
      position: fixed;
      top: 10px;
      right: 10px;
      background: #cc0000;
      border: none;
      color: white;
      padding: 10px 15px;
      cursor: pointer;
      border-radius: 6px;
      font-weight: bold;
      transition: 0.2s;
    }

    #logoutBtn:hover {
      background: #e60000;
      transform: scale(1.05);
    }

    #visitCounter {
      position: fixed;
      top: 10px;
      right: 130px;
      background: #1974D2;
      padding: 10px 15px;
      border-radius: 6px;
      font-weight: bold;
      box-shadow: 0 0 10px rgba(0,0,0,0.4);
    }

    /* ------------------ ADMIN PANEL ------------------ */
    #adminPanel {
      margin-top: 20px;
      padding: 15px;
    }

    #adminPanel input,
    #adminPanel textarea {
      width: 100%;
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 8px;
      border-radius: 6px;
      margin-bottom: 8px;
    }

    #adminPanel button {
      background: #1974D2;
      border: none;
      color: white;
      padding: 10px 15px;
      cursor: pointer;
      border-radius: 6px;
      font-weight: bold;
      transition: 0.2s;
    }

    #adminPanel button:hover {
      background: #1f86ff;
      transform: scale(1.03);
    }

    /* ------------------ POSTS ------------------ */
    #postsContainer div {
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
    }

    #postsContainer h4 {
      margin: 0;
      color: #4da3ff;
    }

    #postsContainer p {
      margin: 5px 0;
    }

    #postsContainer small {
      opacity: 0.7;
    }
  </style>
</head>

<body>
  <div id="visitCounter" class="glass">Visits: ...</div>
  <button id="logoutBtn">Logout</button>

  <h2 id="welcome">Loading...</h2>

  <audio id="bgm" loop></audio>

  <div id="musicPopup" class="glass">
    <h2>Music is featured on this site</h2>
    <p>Would you like to listen to our selected music?</p>
    <button id="yesBtn" class="popup-btn">Sure!</button>
    <button id="noBtn" class="popup-btn">No, thanks.</button>
  </div>

  <center>
    <img src="images/YANS_LOGO.svg" alt="YANS logo" style="margin-top:20px; width:260px;">
  </center>

  <h2 style="text-align:center; margin-top:10px;">
    Welcome to Your Average News Station, your all‑in‑one website for everything
    <a href="https://polytoria.com/u/average" style="font-family:'Segoe Script'; color:#1974D2;">average</a>!
  </h2>

  <div id="adminPanel" class="glass" style="display:none;">
    <h3>Create New Post</h3>
    <input id="postTitle" placeholder="Title">
    <textarea id="postBody" placeholder="Body"></textarea>
    <button id="createPostBtn">Publish</button>
  </div>

  <div id="adminFeed" style="margin-top:20px;">
    <h3>Latest News Posts</h3>
    <div id="postsContainer"></div>
  </div>

  <div id="musicControls" class="glass">
    <button id="volDownBtn" class="ctrl-btn"><span class="material-icons">volume_down</span></button>
    <button id="volUpBtn" class="ctrl-btn"><span class="material-icons">volume_up</span></button>
    <button id="prevBtn" class="ctrl-btn"><span class="material-icons">skip_previous</span></button>
    <button id="restartBtn" class="ctrl-btn"><span class="material-icons">replay</span></button>
    <button id="pauseBtn" class="ctrl-btn"><span class="material-icons">pause</span></button>
    <button id="nextBtn" class="ctrl-btn"><span class="material-icons">skip_next</span></button>
  </div>

  <script>
    firebase.auth().onAuthStateChanged(user => {
      if (!user) {
        window.location.href = "login.html";
      } else {
        document.getElementById("welcome").innerText = "Welcome, " + user.email;

        if (user.email === "noahweiss@odysseyk12.org") {
          document.getElementById("adminPanel").style.display = "block";
        }

        incrementVisitCounter();
        startPostsListener();
      }
    });

    function logout() {
      firebase.auth().signOut().then(() => {
        window.location.href = "login.html";
      });
    }

    const db = firebase.firestore();

    /* VISIT COUNTER */
    const visitsRef = db.collection("siteStats").doc("visits");

    function incrementVisitCounter() {
      visitsRef.get().then(doc => {
        if (!doc.exists) {
          visitsRef.set({ count: 1 });
          document.getElementById("visitCounter").innerText = "Visits: 1";
        } else {
          const newCount = (doc.data().count || 0) + 1;
          visitsRef.update({ count: newCount });
          document.getElementById("visitCounter").innerText = "Visits: " + newCount;
        }
      });
    }

    /* POSTS */
    function createPost() {
      const title = document.getElementById("postTitle").value.trim();
      const body = document.getElementById("postBody").value.trim();
      if (!title || !body) return;

      db.collection("adminPosts").add({
        title,
        body,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      }).then(() => {
        document.getElementById("postTitle").value = "";
        document.getElementById("postBody").value = "";
      });
    }

    document.getElementById("createPostBtn").onclick = createPost;

    function startPostsListener() {
      const postsContainer = document.getElementById("postsContainer");
      db.collection("adminPosts").orderBy("createdAt", "desc").onSnapshot(snapshot => {
        postsContainer.innerHTML = "";
        snapshot.forEach(doc => {
          const data = doc.data();
          const div = document.createElement("div");
          div.classList.add("glass");
          const date = data.createdAt ? data.createdAt.toDate().toLocaleString() : "";
          div.innerHTML = `
            <h4>${data.title}</h4>
            <p>${data.body}</p>
            <small>${date}</small>
          `;
          postsContainer.appendChild(div);
        });
      });
    }

    /* MUSIC */
    const songs = [
      "audio/OneRepublic - Counting Stars.mp3",
      "audio/Tame Impala - The Less I Know The Better.mp3",
      "audio/Michael Jackson - Thriller.mp3"
    ];

    let lastIndex = -1;
    let currentIndex = -1;

    function getRandomSongIndex() {
      let newIndex;
      do {
        newIndex = Math.floor(Math.random() * songs.length);
      } while (newIndex === lastIndex);
      return newIndex;
    }

    const bgm = document.getElementById("bgm");
    const popup = document.getElementById("musicPopup");
    const controls = document.getElementById("musicControls");

    let firstIndex = getRandomSongIndex();
    bgm.src = songs[firstIndex];

    function loadSong(index) {
      currentIndex = index;
      lastIndex = index;
      bgm.src = songs[index];
      bgm.play();
    }

    document.getElementById("yesBtn").onclick = () => {
      loadSong(firstIndex);
      popup.remove();
      controls.style.display = "flex";
    };

    document.getElementById("noBtn").onclick = () => {
      popup.remove();
      controls.remove();
    };

    document.getElementById("volDownBtn").onclick = () => {
      bgm.volume = Math.max(0, bgm.volume - 0.1);
    };

    document.getElementById("volUpBtn").onclick = () => {
      bgm.volume = Math.min(1, bgm.volume + 0.1);
    };

    document.getElementById("prevBtn").onclick = () => {
      currentIndex = (currentIndex - 1 + songs.length) % songs.length;
      loadSong(currentIndex);
    };

    document.getElementById("restartBtn").onclick = () => {
      bgm.currentTime = 0;
      bgm.play();
    };

    document.getElementById("pauseBtn").onclick = () => {
      if (bgm.paused) {
        bgm.play();
        pauseBtn.innerHTML = '<span class="material-icons">pause</span>';
      } else {
        bgm.pause();
        pauseBtn.innerHTML = '<span class="material-icons">play_arrow</span>';
      }
    };

    document.getElementById("nextBtn").onclick = () => {
      let newIndex = getRandomSongIndex();
      loadSong(newIndex);
    };

    bgm.onended = () => {
      let newIndex = getRandomSongIndex();
      loadSong(newIndex);
    };
  </script>
</body>
</html>
