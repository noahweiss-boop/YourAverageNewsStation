<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Your Average News Station (YANS)</title>
    <link rel="icon" type="image/svg+xml" href="images/YANS_LOGO_SOLO.svg">

    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <style>
      body {
        padding: 5px;
        background-color: #111111;
        color: white;
        font-family: 'Yu Gothic UI', sans-serif;
      }

      /* Popup */
      #musicPopup {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        color: black;
        padding: 20px;
        border: 1px solid #CCC;
        border-radius: 0px;
        width: 300px;
        text-align: center;
        font-family: 'Yu Gothic UI', sans-serif;
        box-shadow: 0 0 20px rgba(0,0,0,0.3);
        z-index: 9999;
      }

      .popup-btn {
        padding: 10px 20px;
        border: 1px solid #CCC;
        border-radius: 0px;
        cursor: pointer;
        margin: 5px;
      }

      #yesBtn {
        background: #28a745;
        color: white;
      }

      #noBtn {
        background: #cc0000;
        color: white;
      }

      /* Control Panel */
      #musicControls {
        position: fixed;
        bottom: 15px;
        right: 15px;
        background: #1a1a1a;
        border: 1px solid #333;
        padding: 10px;
        border-radius: 0px;
        display: none; /* HIDDEN UNTIL CONFIRMED */
        gap: 10px;
        z-index: 9999;
        box-shadow: 0 0 10px rgba(0,0,0,0.4);
      }

      .ctrl-btn {
        background: #222;
        color: white;
        border: 1px solid #444;
        padding: 8px;
        cursor: pointer;
        font-size: 20px;
        border-radius: 0px;
        transition: background 0.2s;
      }

      .ctrl-btn:hover {
        background: #333;
      }

      .material-icons {
        font-size: 22px;
        vertical-align: middle;
      }
    </style>
  </head>

  <body>
    <audio id="bgm" loop></audio>

    <div id="musicPopup">
      <h2>Music is featured on this site</h2>
      <p>Would you like to listen to our selected music?</p>
      <button id="yesBtn" class="popup-btn">Sure!</button>
      <button id="noBtn" class="popup-btn">No, thanks.</button>
    </div>

    <img src="images/YANS_LOGO.svg" alt="The YANS logo, blue">

    <h2>
      Welcome to Your Average News Station, your all-in-one website for everything
      <a href="https://polytoria.com/u/average" style="font-family: 'Segoe Script'; color: #1974D2">average</a>!
    </h2>

    <!-- Control Panel -->
    <div id="musicControls">
      <button id="volDownBtn" class="ctrl-btn"><span class="material-icons">volume_down</span></button>
      <button id="volUpBtn" class="ctrl-btn"><span class="material-icons">volume_up</span></button>
      <button id="prevBtn" class="ctrl-btn"><span class="material-icons">skip_previous</span></button>
      <button id="restartBtn" class="ctrl-btn"><span class="material-icons">replay</span></button>
      <button id="pauseBtn" class="ctrl-btn"><span class="material-icons">pause</span></button>
      <button id="nextBtn" class="ctrl-btn"><span class="material-icons">skip_next</span></button>
    </div>

    <script>
      const songs = [
        "audio/OneRepublic - Counting Stars.mp3",
        "audio/Tame Impala - The Less I Know The Better.mp3",
        "audio/Michael Jackson - Thriller.mp3"
      ];

      let lastIndex = -1;
      let currentIndex = -1;

      function getRandomSongIndex() {
        let newIndex;
        do {
          newIndex = Math.floor(Math.random() * songs.length);
        } while (newIndex === lastIndex);
        return newIndex;
      }

      function loadSong(index) {
        currentIndex = index;
        lastIndex = index;
        bgm.src = songs[index];
        bgm.play();
      }

      const popup = document.getElementById("musicPopup");
      const bgm = document.getElementById("bgm");
      const controls = document.getElementById("musicControls");

      // Initial random song
      const firstIndex = getRandomSongIndex();
      loadSong(firstIndex);

      document.getElementById("yesBtn").onclick = () => {
        bgm.play();
        popup.remove();
        controls.style.display = "flex"; // SHOW CONTROL PANEL
      };

      document.getElementById("noBtn").onclick = () => {
        bgm.pause();
        popup.remove();
        controls.remove(); // NEVER SHOW CONTROL PANEL
      };

      // Control buttons
      const volDownBtn = document.getElementById("volDownBtn");
      const volUpBtn = document.getElementById("volUpBtn");
      const prevBtn = document.getElementById("prevBtn");
      const restartBtn = document.getElementById("restartBtn");
      const pauseBtn = document.getElementById("pauseBtn");
      const nextBtn = document.getElementById("nextBtn");

      volDownBtn.onclick = () => {
        bgm.volume = Math.max(0, bgm.volume - 0.1);
      };

      volUpBtn.onclick = () => {
        bgm.volume = Math.min(1, bgm.volume + 0.1);
      };

      prevBtn.onclick = () => {
        currentIndex = (currentIndex - 1 + songs.length) % songs.length;
        loadSong(currentIndex);
      };

      restartBtn.onclick = () => {
        bgm.currentTime = 0;
        bgm.play();
      };

      pauseBtn.onclick = () => {
        if (bgm.paused) {
          bgm.play();
          pauseBtn.innerHTML = '<span class="material-icons">pause</span>';
        } else {
          bgm.pause();
          pauseBtn.innerHTML = '<span class="material-icons">play_arrow</span>';
        }
      };

      nextBtn.onclick = () => {
        let newIndex = getRandomSongIndex();
        loadSong(newIndex);
      };

      bgm.onended = () => {
        let newIndex = getRandomSongIndex();
        loadSong(newIndex);
      };
    </script>
  </body>
</html>
