<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>YANS — Cosmic Nebula Edition</title>
  <link rel="icon" type="image/svg+xml" href="images/YANS_LOGO_SOLO.svg">

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="firebase.js"></script>

  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <style>
    /* ---------------------------------------------------
       GLOBAL COSMIC THEME
    --------------------------------------------------- */
    body {
      margin: 0;
      overflow-x: hidden;
      font-family: 'Yu Gothic UI', sans-serif;
      color: white;
      background: black;
    }

    /* ---------------------------------------------------
       STARFIELD CANVAS
    --------------------------------------------------- */
    #starfield {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -5;
    }

    /* ---------------------------------------------------
       NEBULA LAYERS
    --------------------------------------------------- */
    .nebula {
      position: fixed;
      top: 0; left: 0;
      width: 200%;
      height: 200%;
      background-size: cover;
      opacity: 0.35;
      animation: drift 60s linear infinite;
      z-index: -4;
      filter: blur(20px);
    }

    #nebula1 {
      background-image: url('images/nebula_blue_1.png');
      animation-duration: 90s;
    }

    #nebula2 {
      background-image: url('images/nebula_blue_2.png');
      animation-duration: 120s;
      opacity: 0.25;
    }

    @keyframes drift {
      from { transform: translate(-10%, -10%) scale(1.1); }
      to   { transform: translate(-30%, -30%) scale(1.1); }
    }

    /* ---------------------------------------------------
       WIND PARTICLES
    --------------------------------------------------- */
    .wind {
      position: fixed;
      top: -10vh;
      width: 2px;
      height: 40vh;
      background: rgba(150,200,255,0.4);
      filter: blur(2px);
      animation: windFall 2s linear forwards;
      z-index: -3;
    }

    @keyframes windFall {
      to { transform: translateY(120vh); opacity: 0; }
    }

    /* ---------------------------------------------------
       GLASS PANELS
    --------------------------------------------------- */
    .glass {
      background: rgba(0, 20, 40, 0.45);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(120,160,255,0.25);
      border-radius: 12px;
      box-shadow: 0 0 25px rgba(0,100,255,0.35);
    }

    /* ---------------------------------------------------
       TOP UI
    --------------------------------------------------- */
    #visitCounter {
      position: fixed;
      top: 15px;
      right: 150px;
      padding: 10px 18px;
      font-weight: bold;
      border-radius: 8px;
    }

    #logoutBtn {
      position: fixed;
      top: 15px;
      right: 15px;
      padding: 10px 18px;
      border: none;
      cursor: pointer;
      border-radius: 8px;
      background: #d62828;
      color: white;
      font-weight: bold;
      transition: 0.2s;
    }

    #logoutBtn:hover {
      transform: scale(1.05);
      background: #ff3b3b;
    }

    /* ---------------------------------------------------
       LOGO + WELCOME
    --------------------------------------------------- */
    #logo {
      width: 300px;
      margin-top: 40px;
      filter: drop-shadow(0 0 25px #3fa9ff);
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
      100% { transform: translateY(0); }
    }

    h2 {
      text-align: center;
      margin-top: 10px;
      text-shadow: 0 0 15px #3fa9ff;
    }

    /* ---------------------------------------------------
       MUSIC POPUP
    --------------------------------------------------- */
    #musicPopup {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 350px;
      padding: 25px;
      text-align: center;
      z-index: 9999;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translate(-50%, -45%); }
      to   { opacity: 1; transform: translate(-50%, -50%); }
    }

    .popup-btn {
      padding: 12px 20px;
      margin: 8px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    #yesBtn { background: #28a745; }
    #noBtn  { background: #cc0000; }

    .popup-btn:hover {
      transform: scale(1.05);
      opacity: 0.85;
    }

    /* ---------------------------------------------------
       MUSIC CONTROLS
    --------------------------------------------------- */
    #musicControls {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px;
      display: none;
      gap: 10px;
    }

    .ctrl-btn {
      background: rgba(0, 40, 80, 0.6);
      border: 1px solid rgba(120,160,255,0.3);
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
      color: white;
    }

    .ctrl-btn:hover {
      transform: scale(1.1);
      background: rgba(0, 60, 120, 0.7);
    }

    /* ---------------------------------------------------
       ADMIN PANEL + POSTS
    --------------------------------------------------- */
    #adminPanel, #postsContainer div {
      padding: 15px;
      margin: 20px auto;
      width: 70%;
    }

    #adminPanel input,
    #adminPanel textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 8px;
      border: 1px solid rgba(120,160,255,0.3);
      background: rgba(0, 20, 40, 0.4);
      color: white;
    }

    #adminPanel button {
      padding: 10px 15px;
      border-radius: 8px;
      border: none;
      background: #1974D2;
      color: white;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    #adminPanel button:hover {
      transform: scale(1.05);
      background: #1f86ff;
    }

    #postsContainer div {
      margin-bottom: 15px;
    }

    #postsContainer h4 {
      margin: 0;
      color: #4da3ff;
      text-shadow: 0 0 10px #4da3ff;
    }

    #postsContainer small {
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <!-- STARFIELD + NEBULA -->
  <canvas id="starfield"></canvas>
  <div id="nebula1" class="nebula"></div>
  <div id="nebula2" class="nebula"></div>

  <div id="visitCounter" class="glass">Visits: ...</div>
  <button id="logoutBtn" onclick="logout()">Logout</button>

  <center>
    <img id="logo" src="images/YANS_LOGO.svg">
  </center>

  <h2 id="welcome">Loading...</h2>

  <audio id="bgm" loop></audio>

  <div id="musicPopup" class="glass">
    <h2>Music is featured on this site</h2>
    <p>Would you like to listen to our selected music?</p>
    <button id="yesBtn" class="popup-btn">Sure!</button>
    <button id="noBtn" class="popup-btn">No, thanks.</button>
  </div>

  <div id="adminPanel" class="glass" style="display:none;">
    <h3>Create New Post</h3>
    <input id="postTitle" placeholder="Title">
    <textarea id="postBody" placeholder="Body" style="height:80px;"></textarea>
    <button id="createPostBtn">Publish</button>
  </div>

  <div id="adminFeed">
    <h3 style="text-align:center; text-shadow:0 0 15px #3fa9ff;">Latest News Posts</h3>
    <div id="postsContainer"></div>
  </div>

  <div id="musicControls" class="glass">
    <button id="volDownBtn" class="ctrl-btn"><span class="material-icons">volume_down</span></button>
    <button id="volUpBtn" class="ctrl-btn"><span class="material-icons">volume_up</span></button>
    <button id="prevBtn" class="ctrl-btn"><span class="material-icons">skip_previous</span></button>
    <button id="restartBtn" class="ctrl-btn"><span class="material-icons">replay</span></button>
    <button id="pauseBtn" class="ctrl-btn"><span class="material-icons">pause</span></button>
    <button id="nextBtn" class="ctrl-btn"><span class="material-icons">skip_next</span></button>
  </div>

  <script>
    /* ---------------------------------------------------
       STARFIELD RENDERER
    --------------------------------------------------- */
    const canvas = document.getElementById("starfield");
    const ctx = canvas.getContext("2d");

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.onresize = resize;

    const stars = [];
    for (let i = 0; i < 400; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2,
        speed: Math.random() * 0.2 + 0.05
      });
    }

    function animateStars() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "white";

      for (let s of stars) {
        ctx.globalAlpha = Math.random() * 0.8 + 0.2;
        ctx.fillRect(s.x, s.y, s.size, s.size);
        s.y += s.speed;
        if (s.y > canvas.height) s.y = 0;
      }

      requestAnimationFrame(animateStars);
    }
    animateStars();

    /* ---------------------------------------------------
       WIND PARTICLES
    --------------------------------------------------- */
    function spawnWind() {
      const w = document.createElement("div");
      w.className = "wind";
      w.style.left = Math.random() * 100 + "vw";
      document.body.appendChild(w);
      setTimeout(() => w.remove(), 2500);
    }

    setInterval(() => {
      if (Math.random() < 0.4) spawnWind();
    }, 800);

    /* ---------------------------------------------------
       FIREBASE AUTH + POSTS
    --------------------------------------------------- */
    firebase.auth().onAuthStateChanged(user => {
      if (!user) {
        window.location.href = "login.html";
      } else {
        document.getElementById("welcome").innerText = "Welcome, " + user.email;

        if (user.email === "noahweiss@odysseyk12.org") {
          document.getElementById("adminPanel").style.display = "block";
        }

        incrementVisitCounter();
        startPostsListener();
      }
    });

    function logout() {
      firebase.auth().signOut().then(() => {
        window.location.href = "login.html";
      });
    }

    const db = firebase.firestore();
    const visitsRef = db.collection("siteStats").doc("visits");

    function incrementVisitCounter() {
      visitsRef.get().then(doc => {
        if (!doc.exists) {
          visitsRef.set({ count: 1 });
          document.getElementById("visitCounter").innerText = "Visits: 1";
        } else {
          const newCount = (doc.data().count || 0) + 1;
          visitsRef.update({ count: newCount });
          document.getElementById("visitCounter").innerText = "Visits: " + newCount;
        }
      });
    }

    function createPost() {
      const title = document.getElementById("postTitle").value.trim();
      const body = document.getElementById("postBody").value.trim();
      if (!title || !body) return;

      db.collection("adminPosts").add({
        title,
        body,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      }).then(() => {
        document.getElementById("postTitle").value = "";
        document.getElementById("postBody").value = "";
      });
    }

    document.getElementById("createPostBtn").onclick = createPost;

    function startPostsListener() {
      const postsContainer = document.getElementById("postsContainer");
      db.collection("adminPosts").orderBy("createdAt", "desc").onSnapshot(snapshot => {
        postsContainer.innerHTML = "";
        snapshot.forEach(doc => {
          const data = doc.data();
          const div = document.createElement("div");
          div.classList.add("glass");
          const date = data.createdAt ? data.createdAt.toDate().toLocaleString() : "";
          div.innerHTML = `
            <h4>${data.title}</h4>
            <p>${data.body}</p>
            <small>${date}</small>
          `;
          postsContainer.appendChild(div);
        });
      });
    }

    /* ---------------------------------------------------
       MUSIC SYSTEM
    --------------------------------------------------- */
    const songs = [
      "audio/OneRepublic - Counting Stars.mp3",
      "audio/Tame Impala - The Less I Know The Better.mp3",
      "audio/Michael Jackson - Thriller.mp3"
    ];

    let lastIndex = -1;
    let currentIndex = -1;

    function getRandomSongIndex() {
      let newIndex;
      do {
        newIndex = Math.floor(Math.random() * songs.length);
      } while (newIndex === lastIndex);
      return newIndex;
    }

    const bgm = document.getElementById("bgm");
    const popup = document.getElementById("musicPopup");
    const controls = document.getElementById("musicControls");

    let firstIndex = getRandomSongIndex();
    bgm.src = songs[firstIndex];

    function loadSong(index) {
      currentIndex = index;
      lastIndex = index;
      bgm.src = songs[index];
      bgm.play();
    }

    document.getElementById("yesBtn").onclick = () => {
      loadSong(firstIndex);
      popup.remove();
      controls.style.display = "flex";
    };

    document.getElementById("noBtn").onclick = () => {
      popup.remove();
      controls.remove();
    };

    document.getElementById("volDownBtn").onclick = () => {
      bgm.volume = Math.max(0, bgm.volume - 0.1);
    };

    document.getElementById("volUpBtn").onclick = () => {
      bgm.volume = Math.min(1, bgm.volume + 0.1);
    };

    document.getElementById("prevBtn").onclick = () => {
      currentIndex = (currentIndex - 1 + songs.length) % songs.length;
      loadSong(currentIndex);
    };

    document.getElementById("restartBtn").onclick = () => {
      bgm.currentTime = 0;
      bgm.play();
    };

    document.getElementById("pauseBtn").onclick = () => {
      if (bgm.paused) {
        bgm.play();
        pauseBtn.innerHTML = '<span class="material-icons">pause</span>';
      } else {
        bgm.pause();
        pauseBtn.innerHTML = '<span class="material-icons">play_arrow</span>';
      }
    };

    document.getElementById("nextBtn").onclick = () => {
      let newIndex = getRandomSongIndex();
      loadSong(newIndex);
    };

        bgm.onended = () => {
      let newIndex = getRandomSongIndex();
      loadSong(newIndex);
    };
  </script>

</body>
</html>
