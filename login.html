<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Login - YANS</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="firebase.js"></script>
  <link rel="icon" type="image/svg+xml" href="images/YANS_LOGO_SOLO.svg">

  <style>
    body {
      background: #111;
      color: white;
      font-family: 'Yu Gothic UI', sans-serif;
      padding: 20px;
    }

    input {
      padding: 10px;
      width: 250px;
      margin: 5px 0;
      background: #222;
      border: 1px solid #444;
      color: white;
    }

    button {
      padding: 10px 20px;
      background: #1974D2;
      border: none;
      color: white;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #0f5bb5;
    }

    hr {
      margin: 20px 0;
      border: 1px solid #333;
    }

    .continue-box {
      margin-top: 20px;
      padding-top: 10px;
      border-top: 1px solid #333;
    }

    .continue-label {
      color: #aaa;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .provider-btn {
      width: 260px;
      background: #222;
      border: 1px solid #444;
      color: white;
      padding: 10px;
      margin: 5px 0;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .provider-btn img {
      width: 20px;
      height: 20px;
    }

    .provider-btn:hover {
      background: #2d2d2d;
    }
  </style>
</head>

<body>
  <h2>Login</h2>

  <form onsubmit="login(); return false;">
    <input id="email" type="email" placeholder="Email"><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <button type="submit">Login</button>
  </form>

  <hr>

  <div class="continue-box">
    <p class="continue-label">Continue with</p>

    <button class="provider-btn" onclick="loginWithGoogle()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
      Google
    </button>

    <button class="provider-btn" onclick="loginWithGitHub()">
      <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png">
      GitHub
    </button>
  </div>

  <script>
    function login() {
      const email = document.getElementById("email").value;
      const pass = document.getElementById("password").value;

      firebase.auth().signInWithEmailAndPassword(email, pass)
        .then(() => window.location.href = "home.html")
        .catch(err => alert(err.message));
    }

    function loginWithGoogle() {
      const provider = new firebase.auth.GoogleAuthProvider();
      firebase.auth().signInWithPopup(provider)
        .then(() => window.location.href = "home.html")
        .catch(err => alert(err.message));
    }

    function loginWithGitHub() {
      const provider = new firebase.auth.GithubAuthProvider();
      firebase.auth().signInWithPopup(provider)
        .then(() => window.location.href = "home.html")
        .catch(err => alert(err.message));
    }
  </script>
</body>
</html>
