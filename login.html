<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <!-- Correct Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <!-- Your config -->
  <script src="firebase.js"></script>

  <style>
    body { background:#111; color:white; font-family:'Yu Gothic UI'; padding:20px; }
    input { padding:10px; width:250px; margin:5px 0; }
    button { padding:10px 20px; background:#1974D2; border:none; color:white; cursor:pointer; }
  </style>

  <script>
    function login() {
      const email = document.getElementById("email").value;
      const pass = document.getElementById("password").value;

      firebase.auth().signInWithEmailAndPassword(email, pass)
        .then(() => {
          window.location.href = "home.html";
        })
        .catch(err => alert(err.message));
    }
  </script>
</head>

<body>
  <h2>Login</h2>

  <input id="email" type="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br><br>

  <button onclick="login()">Login</button>
</body>
</html>
